<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>강의 기획안 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Pretendard Variable"', 'Pretendard', 'system-ui', 'sans-serif'],
            },
            boxShadow: {
              soft: '0 1px 3px rgba(15, 23, 42, 0.06), 0 8px 24px rgba(15, 23, 42, 0.06)',
              card: '0 4px 6px -1px rgba(15, 23, 42, 0.07), 0 12px 24px -4px rgba(15, 23, 42, 0.08)',
            },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <div id="app"></div>
    <script>
      (function () {
        const SYSTEM_PROMPT =
          '당신은 기업 교육(HRD) 분야에서 10년 이상 현장을 달려온 베테랑 콘텐츠 기획자입니다.\n\n' +
          '[임무]\n' +
          '사용자가 입력한 강사의 이력·전문 분야·강의 경험을 분석하여, 해당 강사만의 강점이 살아나면서도 최신 AI·디지털 트렌드와 자연스럽게 결합된 온라인·집합 교육용 강의 기획안을 제안합니다.\n\n' +
          '[출력 원칙]\n' +
          '- 기획안은 정확히 3개입니다. 서로 겹치지 않는 관점(예: 입문→실무→심화 등)으로 차별화합니다.\n' +
          '- 입력 이력에서 합리적으로 도출 가능한 범위에서 창의적으로 제안하고, 검증되지 않은 경험을 사실처럼 쓰지 않습니다.\n\n' +
          '[각 기획안에 반드시 포함할 3요소]\n\n' +
          '1) 대주제 (main_theme)\n' +
          '- 최신 AI·디지털 트렌드와 결합한 차별화된 강의 제목 형태의 한 줄입니다.\n' +
          '- 분야 키워드와 트렌드가 한눈에 드러나게 합니다. (예: 브랜드 마케팅 × 생성형 AI)\n\n' +
          '2) 세부 주제 (core_value)\n' +
          '- 수강생이 과정 종료 후 실무에서 바로 쓸 수 있는 핵심 가치를 구체적으로 기술합니다.\n' +
          '- 도구·산출물·역량이 드러나게 합니다. (예: AI 도구를 활용한 브랜드 로고, 톤앤매너, 상세페이지 디자인 자동화)\n\n' +
          '3) 제작 내용 (production_content)\n' +
          '- 상세 강의 주제를 정확히 5줄로 작성합니다.\n' +
          '- 각 줄은 1. ~ 5. 번호로 시작하고, 줄바꿈 문자로만 구분합니다 (총 5줄).\n' +
          '- 한 줄에 하나의 세부 강의 주제만 적습니다.\n\n' +
          '[응답 형식]\n' +
          '아래 JSON 스키마만 사용해 한국어로 응답합니다. JSON 외 설명·마크다운 코드펜스는 넣지 마세요.\n' +
          '{\n' +
          '  "summary": "강사 이력을 바탕으로 한 한 줄 진단 또는 기획 방향",\n' +
          '  "topics": [\n' +
          '    {\n' +
          '      "main_theme": "대주제",\n' +
          '      "core_value": "세부 주제: 수강생이 얻어갈 핵심 가치",\n' +
          '      "production_content": "1. 첫 번째 상세 주제\\n2. 두 번째\\n3. 세 번째\\n4. 네 번째\\n5. 다섯 번째"\n' +
          '    }\n' +
          '  ]\n' +
          '}\n' +
          'topics 배열 길이는 정확히 3이어야 합니다. production_content는 반드시 1.~5. 다섯 줄입니다.';

        function buildUserContentText(raw) {
          return '다음은 유튜브 채널·영상·강사 관련 정보입니다.\n\n---\n' + raw + '\n---';
        }

        var GEMINI_MODEL = 'gemini-1.5-pro';

        function validatePlanPayload(parsed) {
          if (!parsed.topics || !Array.isArray(parsed.topics) || parsed.topics.length !== 3) {
            throw new Error('AI 응답 형식이 올바르지 않습니다.');
          }
          for (var ti = 0; ti < parsed.topics.length; ti++) {
            var topic = parsed.topics[ti];
            if (!topic.main_theme || !topic.core_value || !topic.production_content) {
              throw new Error('AI 응답에 대주제·세부 주제·제작 내용이 모두 있어야 합니다.');
            }
          }
        }

        /** Google Gemini Pro — 강의 기획안 3종(JSON) */
        async function fetchPlansFromGemini(youtubeInfo, apiKey) {
          var url =
            'https://generativelanguage.googleapis.com/v1beta/models/' +
            encodeURIComponent(GEMINI_MODEL) +
            ':generateContent?key=' +
            encodeURIComponent(apiKey);
          var body = {
            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
            contents: [
              {
                role: 'user',
                parts: [{ text: buildUserContentText(youtubeInfo) }],
              },
            ],
            generationConfig: {
              temperature: 0.7,
              responseMimeType: 'application/json',
              maxOutputTokens: 8192,
            },
          };
          var res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            var err = {};
            try {
              err = await res.json();
            } catch (e0) {}
            var msg =
              (err.error && err.error.message) || err.message || res.statusText || 'Gemini 요청에 실패했습니다.';
            throw new Error(msg);
          }
          var data = await res.json();
          var text =
            data.candidates &&
            data.candidates[0] &&
            data.candidates[0].content &&
            data.candidates[0].content.parts &&
            data.candidates[0].content.parts[0] &&
            data.candidates[0].content.parts[0].text;
          if (!text) throw new Error('응답이 비어 있습니다.');
          var parsed = JSON.parse(text);
          validatePlanPayload(parsed);
          return parsed;
        }

        async function fetchProposalsOpenAI(channelText, apiKey) {
          const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: 'Bearer ' + apiKey,
            },
            body: JSON.stringify({
              model: 'gpt-4o-mini',
              messages: [
                { role: 'system', content: SYSTEM_PROMPT },
                {
                  role: 'user',
                  content: buildUserContentText(channelText),
                },
              ],
              response_format: { type: 'json_object' },
              temperature: 0.7,
            }),
          });

          if (!res.ok) {
            var err = {};
            try {
              err = await res.json();
            } catch (e) {}
            var msg = (err.error && err.error.message) || res.statusText || '요청에 실패했습니다.';
            throw new Error(msg);
          }

          const data = await res.json();
          const raw = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
          if (!raw) throw new Error('응답이 비어 있습니다.');

          const parsed = JSON.parse(raw);
          validatePlanPayload(parsed);
          return parsed;
        }

        function demoProposals(channelText) {
          var snippet = channelText.trim().slice(0, 80) || '입력하신 강사';
          return {
            summary:
              '"' +
              snippet +
              (channelText.length > 80 ? '…' : '') +
              '" 이력을 바탕으로 한 데모 기획안입니다. API 키를 입력하면 실제 AI 분석 결과를 받을 수 있습니다.',
            topics: [
              {
                main_theme: '브랜드 마케팅 × 생성형 AI 실전',
                core_value:
                  'AI 도구를 활용해 브랜드 로고·톤앤매너·상세페이지 디자인을 자동화하고, 일관된 비주얼 자산을 실무에서 바로 배포할 수 있는 역량을 갖춥니다.',
                production_content: [
                  '1. 미드저니와 캔바(Canva)를 연동하여 브랜드 일관성을 유지하는 상업용 이미지 대량 생성',
                  '2. 경쟁사 벤치마킹부터 우리 브랜드만의 차별화된 스토리텔링 프롬프트 엔지니어링',
                  '3. 클릭을 부르는 AI 기반 상세페이지 레이아웃 설계 및 자동 A/B 테스트 환경 구축',
                  '4. 브랜드 톤앤매너 가이드를 LLM에 주입해 카피·SNS 문구를 일괄 생성·검수하는 워크플로우',
                  '5. 저작권·표기 가이드와 함께 생성물을 내부 승인용 패키지로 정리하는 산출물 표준화',
                ].join('\n'),
              },
              {
                main_theme: '디지털 리터러시 × 업무 자동화 입문',
                core_value:
                  '반복 업무를 AI·노코드 도구로 줄이고, 데이터 기반으로 의사결정을 설명할 수 있는 디지털 커뮤니케이션 역량을 얻습니다.',
                production_content: [
                  '1. 생성형 AI의 한계·할루시네이션 대응과 프롬프트 기본기',
                  '2. 스프레드시트·폼과 연동한 간단한 업무 자동화 시나리오 설계',
                  '3. 회의록·이메일 초안 자동화와 팀 내 공유 템플릿 제작',
                  '4. 개인정보·보안 체크리스트를 포함한 안전한 AI 활용 가이드',
                  '5. 2주 실습 과제: 본인 업무 1건을 자동화해 발표하는 캡스톤',
                ].join('\n'),
              },
              {
                main_theme: '심화 HRD: AI 시대 역량 모델과 교육 설계',
                core_value:
                  '조직의 직무·역량 프레임과 연계해 AI 시대 핵심 역량을 정의하고, 학습 목표·평가까지 일관되게 설계할 수 있습니다.',
                production_content: [
                  '1. 산업별 AI 도입 사례와 우리 조직에 맞는 역량 갭 분석',
                  '2. 학습 목표(Bloom·Kirkpatrick)와 콘텐츠 모듈 매핑 실습',
                  '3. 시뮬레이션·캡스톤 중심의 성과 측정 지표 설계',
                  '4. 내부 강사·외부 강사 혼합 운영 모델과 커리큘럼 로드맵',
                  '5. 이해관계자 설득용 기획안·예산 요약 슬라이드 구성',
                ].join('\n'),
              },
            ],
          };
        }

        function escapeHtml(s) {
          var div = document.createElement('div');
          div.textContent = s;
          return div.innerHTML;
        }

        function formatProductionContent(raw) {
          if (!raw) return '';
          return escapeHtml(String(raw)).replace(/\n/g, '<br>');
        }

        function render(state) {
          var loading = state.loading;
          var error = state.error;
          var result = state.result;
          var channelText = state.channelText;
          var apiKey = state.apiKey;
          var provider = state.provider || 'gemini';

          var resultHtml = '';
          if (result) {
            resultHtml =
              '<div class="mt-10 space-y-6">' +
              '<div class="rounded-2xl border border-slate-200/80 bg-white p-6 shadow-soft">' +
              '<p class="text-xs font-medium uppercase tracking-wide text-slate-500">기획 한줄 요약</p>' +
              '<p class="mt-2 text-lg font-medium text-slate-900">' +
              escapeHtml(result.summary) +
              '</p></div>' +
              '<div class="grid gap-6 md:grid-cols-3">' +
              result.topics
                .map(function (t, i) {
                  return (
                    '<article class="flex flex-col rounded-2xl border border-slate-200/80 bg-white p-6 shadow-card transition hover:border-blue-200/80 hover:shadow-lg">' +
                    '<div class="mb-4 flex items-start justify-between gap-3">' +
                    '<span class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-blue-600 text-sm font-bold text-white">' +
                    (i + 1) +
                    '</span>' +
                    '<span class="rounded-full bg-slate-100 px-2.5 py-0.5 text-xs text-slate-600">기획안</span></div>' +
                    '<p class="text-xs font-semibold uppercase tracking-wide text-slate-500">대주제</p>' +
                    '<h3 class="mt-1 text-xl font-semibold leading-snug text-slate-900">' +
                    escapeHtml(t.main_theme) +
                    '</h3>' +
                    '<div class="mt-5">' +
                    '<p class="text-xs font-semibold uppercase tracking-wide text-slate-500">세부 주제 · 수강생 핵심 가치</p>' +
                    '<p class="mt-2 text-sm leading-relaxed text-slate-700">' +
                    escapeHtml(t.core_value) +
                    '</p></div>' +
                    '<div class="mt-5 flex-1 border-t border-slate-100 pt-4">' +
                    '<p class="text-xs font-semibold uppercase tracking-wide text-slate-500">제작 내용 (상세 5줄)</p>' +
                    '<div class="mt-2 text-sm leading-relaxed text-slate-800">' +
                    formatProductionContent(t.production_content) +
                    '</div></div></article>'
                  );
                })
                .join('') +
              '</div></div>';
          }

          document.getElementById('app').innerHTML =
            '<div class="relative min-h-screen">' +
            '<div class="pointer-events-none absolute inset-0 overflow-hidden">' +
            '<div class="absolute -left-40 top-0 h-96 w-96 rounded-full bg-blue-400/15 blur-3xl"></div>' +
            '<div class="absolute -right-40 bottom-0 h-96 w-96 rounded-full bg-indigo-400/10 blur-3xl"></div></div>' +
            '<header class="relative border-b border-slate-200/60 bg-white/70 backdrop-blur-md">' +
            '<div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-5 sm:px-6">' +
            '<div class="flex items-center gap-3">' +
            '<div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 text-lg font-bold text-white shadow-md">▶</div>' +
            '<div><h1 class="text-lg font-semibold text-slate-900">강의 기획안 생성기</h1>' +
            '<p class="text-sm text-slate-500">유튜브·강사 정보 → HRD 콘텐츠 기획안 3안</p></div></div></div></header>' +
            '<main class="relative mx-auto max-w-5xl px-4 py-10 sm:px-6">' +
            '<section class="rounded-2xl border border-slate-200/80 bg-white p-6 shadow-soft sm:p-8">' +
            '<label for="channel" class="block text-sm font-medium text-slate-700">유튜브·강사 정보</label>' +
            '<p class="mt-1 text-sm text-slate-500">채널 소개, 대표 영상 주제, 경력·강의 이력 등을 붙여 넣어 주세요.</p>' +
            '<textarea id="channel" rows="8" class="mt-4 w-full resize-y rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="예: OO대 시각디자인 졸업, 8년 차 브랜드 디자이너, 마케팅팀 리브랜딩 프로젝트 3회, 온라인 강의 2개 제작…">' +
            escapeHtml(channelText) +
            '</textarea>' +
            '<div class="mt-6 grid gap-4 sm:grid-cols-2">' +
            '<div>' +
            '<label for="provider" class="block text-sm font-medium text-slate-700">API 제공자</label>' +
            '<select id="provider" class="mt-2 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20">' +
            '<option value="gemini"' +
            (provider === 'gemini' ? ' selected' : '') +
            '>Google Gemini</option>' +
            '<option value="openai"' +
            (provider === 'openai' ? ' selected' : '') +
            '>OpenAI</option>' +
            '</select></div>' +
            '<div class="sm:col-span-2 rounded-xl border border-dashed border-slate-200 bg-slate-50/80 p-4">' +
            '<label for="apikey" class="text-sm font-medium text-slate-700">API 키 <span class="font-normal text-slate-500">(선택)</span></label>' +
            '<p class="mt-1 text-xs text-slate-500">Gemini: Google AI Studio(AIza…). OpenAI: sk-… . 비우면 데모입니다.</p>' +
            '<input id="apikey" type="password" autocomplete="off" class="mt-3 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="AIza… 또는 sk-…" value="' +
            escapeHtml(apiKey) +
            '" />' +
            '</div></div>' +
            '<div class="mt-6 flex flex-wrap items-center gap-3">' +
            '<button type="button" id="generate" class="inline-flex items-center justify-center gap-2 rounded-xl bg-blue-600 px-6 py-3 text-sm font-semibold text-white shadow-md transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-60"' +
            (loading ? ' disabled' : '') +
            '>' +
            (loading
              ? '<span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"></span>'
              : '') +
            (loading ? '분석 중…' : '기획안 생성') +
            '</button>' +
            (error ? '<p class="text-sm text-red-600">' + escapeHtml(error) + '</p>' : '') +
            '</div></section>' +
            resultHtml +
            '</main>' +
            '<footer class="relative border-t border-slate-200/60 py-8 text-center text-xs text-slate-400">강의 기획안 생성기 · Tailwind CSS</footer></div>';

          var ta = document.getElementById('channel');
          var keyInput = document.getElementById('apikey');
          var providerEl = document.getElementById('provider');
          var btn = document.getElementById('generate');

          ta &&
            ta.addEventListener('input', function () {
              state.channelText = ta.value;
            });
          providerEl &&
            providerEl.addEventListener('change', function () {
              state.provider = providerEl.value;
              try {
                sessionStorage.setItem('yt_planner_provider', providerEl.value);
              } catch (e) {}
            });
          keyInput &&
            keyInput.addEventListener('input', function () {
              state.apiKey = keyInput.value;
              try {
                sessionStorage.setItem('yt_planner_api_key', keyInput.value);
              } catch (e) {}
            });

          btn &&
            btn.addEventListener('click', async function () {
              var text = (ta && ta.value && ta.value.trim()) || '';
              if (!text) {
                state.error = '유튜브·강사 정보를 입력해 주세요.';
                state.result = null;
                render(state);
                return;
              }

              state.error = null;
              state.loading = true;
              state.channelText = text;
              render(state);

              var key = (keyInput && keyInput.value && keyInput.value.trim()) || '';
              var prov = (providerEl && providerEl.value) || state.provider || 'gemini';

              try {
                var data;
                if (key) {
                  if (prov === 'gemini') {
                    data = await fetchPlansFromGemini(text, key);
                  } else {
                    data = await fetchProposalsOpenAI(text, key);
                  }
                } else {
                  await new Promise(function (r) {
                    setTimeout(r, 600);
                  });
                  data = demoProposals(text);
                }
                state.result = data;
              } catch (e) {
                state.error = (e && e.message) || '오류가 발생했습니다.';
                state.result = null;
              } finally {
                state.loading = false;
                render(state);
              }
            });
        }

        var savedKey = '';
        var savedProvider = 'gemini';
        try {
          savedKey = sessionStorage.getItem('yt_planner_api_key') || '';
          savedProvider = sessionStorage.getItem('yt_planner_provider') || 'gemini';
        } catch (e) {}

        var state = {
          channelText: '',
          apiKey: savedKey,
          provider: savedProvider === 'openai' ? 'openai' : 'gemini',
          loading: false,
          error: null,
          result: null,
        };

        render(state);
      })();
    </script>
  </body>
</html>
