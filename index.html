!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 강의 기획 비서</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-blue-600">🎓 AI 강의 기획 비서</h1>
            <p class="text-gray-600 mt-2">강사님의 정보를 붙여넣으면 최신 트렌드를 반영한 강의안을 짜드립니다.</p>
        </header>

        <main class="space-y-6">
            <section class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-sm font-medium text-gray-700 mb-2">유튜브 채널/강사 정보 입력</label>
                <textarea id="youtubeInput" rows="8" class="w-full p-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="유튜브 채널의 '정보' 탭 내용을 복사해서 붙여넣으세요..."></textarea>
                <button onclick="generatePlan()" id="btn" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">🚀 강의 기획안 생성하기</button>
            </section>

            <section id="resultSection" class="hidden space-y-4">
                <h2 class="text-xl font-bold text-gray-800">✨ 추천 강의 기획안</h2>
                <div id="resultContainer" class="grid gap-4">
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
